services:
  mariadb:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_USER: moodle
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_DATABASE: moodle
      MARIADB_CHARACTER_SET: utf8mb4
      MARIADB_COLLATE: utf8mb4_unicode_ci
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-file-per-table=1
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -uroot -p${DB_ROOT_PASSWORD}"]
      interval: 10s
      retries: 10

  moodle:
    build: .
    image: infinity-learn/moodle:prod
    restart: unless-stopped
    depends_on:
      mariadb: { condition: service_healthy }
    ports:
      # Loopback only — Caddy on the host (or in CRM's compose) proxies in.
      - "127.0.0.1:8090:80"
    environment:
      MOODLE_DATABASE_HOST: mariadb
      MOODLE_DATABASE_PORT: "3306"
      MOODLE_DATABASE_USER: moodle
      MOODLE_DATABASE_PASSWORD: ${DB_PASSWORD}
      MOODLE_DATABASE_NAME: moodle
      MOODLE_USERNAME: admin
      MOODLE_PASSWORD: ${ADMIN_PASSWORD}
      MOODLE_EMAIL: ${ADMIN_EMAIL}
      MOODLE_SITE_NAME: "Infinity Learn"
      MOODLE_WWWROOT: "https://${DOMAIN}"
      # [!] Required when Caddy terminates TLS upstream.
      MOODLE_REVERSEPROXY: "true"
    volumes:
      - moodledata:/var/www/moodledata
      - ./theme/infinity:/var/www/html/theme/infinity:ro
      - ./local/infinity:/var/www/html/local/infinity:ro

volumes:
  mariadb_data:
  moodledata:
